services:

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"

    volumes: 
      - .:/app

    env_file:
      - .env

    depends_on:
      - db
      - redis

  db:
    image: postgres:17

    environment:
      POSTGRES_DB: public_support_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Dhruv@2007

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  celery:
    build: .

    command: celery -A djangoProject worker -l info

    env_file:
      - .env

    depends_on:
      - redis
      - db

  celery-beat:
    build: .
    command: celery -A djangoProject beat -l info

    env_file:
    - .env

    depends_on:
    - redis
    - db

volumes:
  postgres_data:

  