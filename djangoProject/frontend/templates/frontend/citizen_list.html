{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Citizens</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/user_list.css' %}">

</head>

<body>

<div class="container">

<h1>All Citizens</h1>

<div class="grid">

{% for user in citizens %}

<div class="card">

<div class="avatar">
{{ user.username|first|upper }}
</div>

<h3>{{ user.username }}</h3>

<p>{{ user.email|default:"No email" }}</p>

<span class="tag citizen">Citizen</span>

</div>

{% empty %}

<p>No citizens found</p>

{% endfor %}

</div>

</div>

</body>
</html>
